<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Categories</title>
  <link rel="stylesheet" href="assets/fonts/fontawesome/css/all.min.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body class="admin-page">
  <div style="padding: 20px;">
    <h1>Test Categories Module</h1>
    <button onclick="testLoadCategories()" class="btn-admin btn-admin-primary">Load Categories</button>
    <button onclick="testOpenModal()" class="btn-admin btn-admin-secondary">Open Add Modal</button>
    <div id="test-output" style="margin-top: 20px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 8px;">
      <pre id="output-text" style="color: #e2e8f0; font-size: 1rem;"></pre>
    </div>
  </div>

  <!-- Category Modal -->
  <div id="category-modal" class="admin-modal-overlay" onclick="if(event.target===this)AdminCategories.closeCategoryModal()" style="display:none">
    <div class="admin-modal-box" style="max-width:700px">
      <button class="admin-modal-close" onclick="AdminCategories.closeCategoryModal()" aria-label="Cerrar">
        <i class="fas fa-times"></i>
      </button>
      <div class="admin-modal-title">
        <i class="fas fa-folder-tree" style="margin-right:8px"></i>
        <span id="category-modal-title">Categoría de Producto</span>
      </div>
      <div class="admin-modal-subtitle">Completa los datos de la categoría y sus subcategorías</div>

      <form id="category-form" onsubmit="AdminCategories.saveCategory(event)" novalidate>
        <div style="display:grid;grid-template-columns:2fr 1fr;gap:12px">
          <div class="modal-form-field">
            <label for="cat-name">Nombre <span style="color:#f87171">*</span></label>
            <input type="text" id="cat-name" placeholder="Regalos Personalizados" required>
          </div>
          <div class="modal-form-field">
            <label for="cat-icon">Icono/Emoji</label>
            <input type="text" id="cat-icon" placeholder="🎁" maxlength="10" style="text-align:center;font-size:1.5rem">
          </div>
        </div>

        <div class="modal-form-field">
          <label for="cat-description">Descripción <span style="color:#475569;font-weight:400;text-transform:none">(opcional)</span></label>
          <textarea id="cat-description" rows="2" placeholder="Notas administrativas sobre esta categoría"></textarea>
        </div>

        <div class="modal-form-field">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <label style="margin:0">Subcategorías</label>
            <button type="button" class="btn-admin btn-admin-secondary btn-admin-sm" onclick="AdminCategories._addSubCategoryRow()">
              <i class="fas fa-plus"></i> Agregar Subcategoría
            </button>
          </div>
          <div id="subcategories-list" style="border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:12px;background:rgba(255,255,255,0.02);min-height:100px">
            <!-- Subcategories table will be rendered here -->
          </div>
        </div>

        <div class="modal-error" id="category-form-err" style="margin-top:10px"></div>
        <div style="display:flex;gap:10px;margin-top:18px">
          <button type="button" class="btn-modal-ghost" style="flex:1" onclick="AdminCategories.closeCategoryModal()">
            <i class="fas fa-times"></i>&nbsp; Cancelar
          </button>
          <button type="submit" class="btn-modal-primary" style="flex:1;margin-top:0" id="category-save-btn">
            <i class="fas fa-save"></i>&nbsp; Guardar
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    window.FILAMORFOSIS_API_BASE = 'http://localhost:5205/api/v1';
    window.FILAMORFOSIS_CDN_BASE = null;

    // Mock toast function
    window.toast = function(msg, success = true) {
      console.log('[TOAST]', msg, success ? '✓' : '✗');
      document.getElementById('output-text').textContent += `\n[TOAST] ${msg} ${success ? '✓' : '✗'}`;
    };

    // Mock spin function
    window.spin = function(btn, spinning) {
      console.log('[SPIN]', btn, spinning);
    };

    // Mock adminConfirm function
    window.adminConfirm = async function(msg, title) {
      return confirm(msg);
    };
  </script>
  <script src="assets/js/admin-api.js"></script>
  <script src="assets/js/admin-categories.js"></script>

  <script>
    async function testLoadCategories() {
      const output = document.getElementById('output-text');
      output.textContent = 'Loading categories...\n';
      try {
        await AdminCategories.loadCategories();
        const categories = AdminCategories.getCategories();
        output.textContent += `Loaded ${categories.length} categories:\n`;
        categories.forEach(cat => {
          output.textContent += `\n${cat.icon} ${cat.name} (${cat.subCategories?.length || 0} subcategories)`;
          if (cat.subCategories) {
            cat.subCategories.forEach(sub => {
              output.textContent += `\n  - ${sub.icon || ''} ${sub.name}`;
            });
          }
        });
      } catch (e) {
        output.textContent += `\nError: ${e.message}`;
      }
    }

    function testOpenModal() {
      AdminCategories.openAddCategoryModal();
    }

    // Initialize
    AdminCategories.init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — Filamorfosis® | Finalizar compra</title>
  <meta name="description" content="Finaliza tu compra de forma segura con MercadoPago.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/fonts/fontawesome/css/all.min.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/store.css">
</head>
<body class="dark-theme">

  <!-- Navbar -->
  <nav class="navbar" id="main-navbar">
    <a href="index.html" class="navbar__brand">
      <img src="assets/img/Profile2.png" alt="Filamorfosis" class="navbar__logo">
      <span>Filamorfosis<sup>®</sup></span>
    </a>
    <div class="navbar__actions">
      <button class="cart-icon" id="cart-nav-icon" aria-label="Ver carrito" onclick="FilamorfosisCart.openDrawer()">
        <i class="fas fa-shopping-cart"></i>
        <span id="cart-count" class="cart-badge">0</span>
      </button>
      <span data-auth="logged-in" style="display:none">
        <span id="navbar-user-name" class="navbar__username"></span>
        <a href="account.html" class="navbar__link"><i class="fas fa-user"></i></a>
        <a href="#" data-action="logout" class="navbar__link"><i class="fas fa-sign-out-alt"></i></a>
      </span>
      <span data-auth="logged-out">
        <a href="javascript:void(0)" data-action="show-login" class="btn-outline" data-t="auth.login">Iniciar sesión</a>
      </span>
    </div>
  </nav>

  <!-- Checkout -->
  <main class="checkout-page container">
    <h1 class="checkout-page__title" data-t="checkout.title">Finalizar compra</h1>

    <div class="checkout-layout">
      <!-- Left: Address + Notes -->
      <section class="checkout-form-section">
        <h2 data-t="checkout.shipping">Dirección de envío</h2>

        <div id="saved-addresses" class="address-list"></div>

        <details id="new-address-details" class="new-address-form">
          <summary data-t="checkout.addAddress">+ Agregar nueva dirección</summary>
          <form id="new-address-form" novalidate>
            <div class="form-row">
              <div class="form-field">
                <label data-t="checkout.street">Calle y número</label>
                <input type="text" id="addr-street" required>
              </div>
            </div>
            <div class="form-row">
              <div class="form-field">
                <label data-t="checkout.city">Ciudad</label>
                <input type="text" id="addr-city" required>
              </div>
              <div class="form-field">
                <label data-t="checkout.state">Estado</label>
                <input type="text" id="addr-state" required>
              </div>
            </div>
            <div class="form-row">
              <div class="form-field">
                <label data-t="checkout.postalCode">Código postal</label>
                <input type="text" id="addr-postal" required>
              </div>
              <div class="form-field">
                <label data-t="checkout.country">País</label>
                <input type="text" id="addr-country" value="MX" required>
              </div>
            </div>
            <button type="submit" class="btn-secondary" data-t="checkout.saveAddress">Guardar dirección</button>
          </form>
        </details>

        <div class="form-field" style="margin-top:1.5rem">
          <label for="order-notes" data-t="checkout.notes">Notas del pedido (opcional)</label>
          <textarea id="order-notes" rows="3" placeholder="Instrucciones especiales..."></textarea>
        </div>
      </section>

      <!-- Right: Order summary -->
      <aside class="checkout-summary">
        <h2 data-t="checkout.summary">Resumen del pedido</h2>
        <div id="checkout-items"></div>
        <div class="checkout-summary__total">
          <span data-t="checkout.total">Total:</span>
          <strong id="checkout-total">$0 MXN</strong>
        </div>
        <span class="checkout-error" id="checkout-error"></span>
        <button id="pay-btn" class="btn-primary checkout-summary__pay" data-t="checkout.pay">
          <i class="fab fa-mercado-pago"></i> Pagar con MercadoPago
        </button>
      </aside>
    </div>
  </main>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/mock-api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/store-i18n.js"></script>
  <script src="assets/js/checkout.js"></script>
</body>
</html>

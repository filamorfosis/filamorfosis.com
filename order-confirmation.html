ГЇВ»Вї<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body class="dark-theme">

      <span>Filamorfosis<sup>Г‚В®</sup></span>

    <div class="navbar__actions">
      <button class="cart-icon" id="cart-nav-icon" aria-label="Ver carrito" onclick="FilamorfosisCart && FilamorfosisCart.openDrawer()">
        <i class="fas fa-shopping-cart"></i>

  <main class="confirmation-page container" id="confirmation-content">

  <script>
    if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
      window.FILAMORFOSIS_API_BASE = 'http://localhost:5205/api/v1';
    }
  </script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/store-i18n.js"></script>
  <script src="assets/js/toast.js"></script>
  <script src="assets/js/whatsapp-fab.js"></script>
  <script src="assets/js/cookie-consent.js"></script>
  <script>
  (function () {
    'use strict';

    /* ГўВ”ВЂГўВ”ВЂ Confetti (16.1) ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ */
    function initConfetti() {
      var confettiEl = document.createElement('div');
      confettiEl.id = 'confetti-container';
      confettiEl.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:9999';
      document.body.appendChild(confettiEl);

      if (typeof particlesJS === 'function') {
        particlesJS('confetti-container', {
          particles: {
            number: { value: 120, density: { enable: true, value_area: 800 } },
            color: { value: ['#a78bfa', '#60a5fa', '#ec4899', '#34d399', '#fbbf24'] },
            shape: { type: ['circle', 'edge', 'triangle'] },
            opacity: { value: 0.9, random: true },
            size: { value: 6, random: true },
            line_linked: { enable: false },
            move: {
              enable: true,
              speed: 6,
              direction: 'bottom',
              random: true,
              straight: false,
              out_mode: 'out',
              bounce: false
            }
          },
          interactivity: { events: { onhover: { enable: false }, onclick: { enable: false } } },
          retina_detect: true
        });

        setTimeout(function () {
          if (window.pJSDom && window.pJSDom.length > 0) {
            try { window.pJSDom[0].pJS.fn.vendors.destroypJS(); } catch (e) { /* ignore */ }
            window.pJSDom = [];
          }
          if (confettiEl.parentNode) confettiEl.parentNode.removeChild(confettiEl);
        }, 3000);
      } else {
        /* Particles.js not loaded ГўВЂВ” just remove the container after 3s */
        setTimeout(function () {
          if (confettiEl.parentNode) confettiEl.parentNode.removeChild(confettiEl);
        }, 3000);
      }
    }

    /* ГўВ”ВЂГўВ”ВЂ Helpers ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ */
    function esc(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function _renderItemThumb(item) {
      if (item.designFileUrl) {
        return '<img class="confirmation-item__thumb" src="' + esc(item.designFileUrl) + '" alt="DiseГѓВ±o" loading="lazy">';
      }
      if (item.imageUrl) {
        return '<img class="confirmation-item__thumb" src="' + esc(item.imageUrl) + '" alt="' + esc(item.productTitleEs || '') + '" loading="lazy">';
      }
      return '<div class="confirmation-item__thumb confirmation-item__thumb--placeholder" aria-hidden="true"><i class="fas fa-box"></i></div>';
    }

    function _renderItems(items) {
      if (!items || items.length === 0) return '';
      return items.map(function (i) {
        var lineTotal = ((i.unitPrice || 0) * (i.quantity || 1)).toFixed(2);
        return '<div class="confirmation-item">'
          + _renderItemThumb(i)
          + '<div class="confirmation-item__info">'
          + '<p class="confirmation-item__name">' + esc(i.productTitleEs || i.productTitle || 'Producto') + '</p>'
          + '<p class="confirmation-item__variant">' + esc(i.variantLabelEs || i.variantLabel || '') + ' &times; ' + esc(i.quantity) + '</p>'
          + '<p class="confirmation-item__price">' + lineTotal + ' MXN</p>'
          + '</div>'
          + '</div>';
      }).join('');
    }

    /* ГўВ”ВЂГўВ”ВЂ Success state (16.2, 16.3, 16.4, 16.5, 16.6, 16.9) ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ */
    function _renderSuccess(order) {
      var items = _renderItems(order.items);
      var total = (order.total != null ? order.total : 0).toFixed(2);
      var shareText = encodeURIComponent('Г‚ВЎAcabo de hacer un pedido en FilamorfosisГ‚В®! Г°ВџВљВЂ ' + window.location.href);
      var waShareUrl = 'https://wa.me/?text=' + shareText;

      var addressHtml = '';
      if (order.shippingAddress) {
        var a = order.shippingAddress;
        addressHtml = '<div class="confirmation-order-id" style="text-align:left;width:100%">'
          + '<span style="color:#94a3b8;font-size: 1rem"><i class="fas fa-map-marker-alt" style="color:#a78bfa;margin-right:4px"></i>EnvГѓВ­o a: </span>'
          + esc([a.street, a.city, a.state, a.postalCode].filter(Boolean).join(', '))
          + '</div>';
      }

      return '<div class="confirmation-card success">'
        /* Gradient heading (16.2) */
        + '<h1 class="confirmation-gradient-title">Г‚ВЎTu pedido estГѓВЎ en camino! Г°ВџВљВЂ</h1>'
        + '<p>Г‚ВЎGracias por tu compra! Te enviaremos una confirmaciГѓВіn por correo.</p>'
        /* Order ID */
        + '<div class="confirmation-order-id">'
        + '<span>Pedido #</span><strong>' + esc(order.id) + '</strong>'
        + '</div>'
        /* Order summary (16.3, 16.4) */
        + (items ? '<div class="confirmation-items" style="width:100%">' + items + '</div>' : '')
        /* Shipping address */
        + addressHtml
        /* Grand total */
        + '<div class="confirmation-total"><span>Total:</span><strong>' + total + ' MXN</strong></div>'
        /* Rewards placeholder (16.5) */
        + '<div class="confirmation-rewards card">'
        + '<span style="font-size:2rem">Г°ВџВЏВ†</span>'
        + '<div>'
        + '<p class="confirmation-rewards__title">Г‚ВЎGanaste puntos por esta compra! Г°ВџВЋВ‰</p>'
        + '<p class="confirmation-rewards__sub">PrГѓВіximamente podrГѓВЎs canjearlos por descuentos.</p>'
        + '</div>'
        + '</div>'
        /* CTA buttons (16.6) */
        + '<div class="confirmation-actions">'
        + '<a href="account.html#orders" class="btn-secondary">Ver mis pedidos</a>'
        + '<a href="products.html" class="btn-primary">Seguir comprando</a>'
        + '</div>'
        /* Social sharing (16.9) */
        + '<div class="confirmation-share">'
        + '<p>Г‚ВЎComparte tu pedido!</p>'
        + '<a href="' + waShareUrl + '" target="_blank" rel="noopener noreferrer" class="btn-secondary confirmation-share__wa">'
        + '<i class="fab fa-whatsapp"></i> Compartir en WhatsApp'
        + '</a>'
        + '<button id="copy-link-btn" class="btn-secondary"><i class="fas fa-link"></i> Copiar enlace</button>'
        + '</div>'
        + '</div>';
    }

    /* ГўВ”ВЂГўВ”ВЂ Failure state (16.7) ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ */
    function _renderFailure(orderId) {
      return '<div class="confirmation-card failure">'
        + '<div class="confirmation-failure">'
        + '<h1>ГўВќВЊ Pago no completado</h1>'
        + '<p>Hubo un problema con tu pago. Por favor intenta de nuevo.</p>'
        + '<div class="confirmation-actions" style="justify-content:center;margin-top:1rem">'
        + '<button id="retry-payment-btn" class="btn-primary">Reintentar pago</button>'
        + '<a href="https://wa.me/13152071586" target="_blank" rel="noopener noreferrer" class="btn-secondary">'
        + '<i class="fab fa-whatsapp"></i> Soporte por WhatsApp'
        + '</a>'
        + '</div>'
        + '</div>'
        + '</div>';
    }

    /* ГўВ”ВЂГўВ”ВЂ Pending state (16.8) ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ */
    function _renderPending(orderId) {
      return '<div class="confirmation-card pending">'
        + '<div class="confirmation-pending">'
        + '<div class="confirmation-spinner"></div>'
        + '<h1>ГўВЏВі Pago en proceso</h1>'
        + '<p>Tu pago estГѓВЎ siendo procesado. RecibirГѓВЎs una confirmaciГѓВіn en tu correo en los prГѓВіximos minutos.</p>'
        + '<p class="confirmation-pending__eta">Tiempo estimado: 5ГўВЂВ“10 minutos</p>'
        + '</div>'
        + '</div>';
    }

    /* ГўВ”ВЂГўВ”ВЂ Wire up interactive elements ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ */
    function _bindEvents(status, orderId) {
      /* Copy-link button */
      var copyBtn = document.getElementById('copy-link-btn');
      if (copyBtn) {
        copyBtn.addEventListener('click', function () {
          navigator.clipboard.writeText(window.location.href).then(function () {
            window.Toast && window.Toast.show({ message: 'Г‚ВЎEnlace copiado!', type: 'success' });
          }).catch(function () {
            window.Toast && window.Toast.show({ message: 'Г‚ВЎEnlace copiado!', type: 'success' });
          });
        });
      }

      /* Retry payment button */
      var retryBtn = document.getElementById('retry-payment-btn');
      if (retryBtn) {
        retryBtn.addEventListener('click', async function () {
          retryBtn.disabled = true;
          retryBtn.textContent = 'Procesando...';
          try {
            var p = await createPayment(orderId);
            if (p && p.checkoutUrl) {
              window.location.href = p.checkoutUrl;
            }
          } catch (err) {
            window.Toast && window.Toast.show({ message: (err && err.detail) || 'Error al reintentar el pago.', type: 'error' });
            retryBtn.disabled = false;
            retryBtn.textContent = 'Reintentar pago';
          }
        });
      }
    }

    /* ГўВ”ВЂГўВ”ВЂ Init ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ */
    async function init() {
      var params = new URLSearchParams(location.search);
      var status = params.get('status');
      var orderId = params.get('orderId');
      var el = document.getElementById('confirmation-content');

      if (status === 'success' && orderId) {
        /* Fetch order data, fall back to minimal object on error */
        var order;
        try {
          order = await getOrder(orderId);
        } catch (_) {
          order = { id: orderId, items: [], total: 0, status: 'Paid' };
        }
        el.innerHTML = _renderSuccess(order);
        initConfetti();
        _bindEvents(status, orderId);

      } else if (status === 'failure') {
        el.innerHTML = _renderFailure(orderId);
        _bindEvents(status, orderId);

      } else if (status === 'pending') {
        el.innerHTML = _renderPending(orderId);

      } else {
        el.innerHTML = '<div class="confirmation-card"><p>ParГѓВЎmetros invГѓВЎlidos.</p>'
          + '<div class="confirmation-actions"><a href="products.html" class="btn-primary">Ver productos</a></div></div>';
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
  </script>
</body>
</html>
